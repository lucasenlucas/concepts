<!doctype html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title></title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      cursor: none;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      background: #000;
    }

    #hint {
      position: fixed;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.18);
      font-family: Arial, sans-serif;
      font-size: 13px;
      pointer-events: none;
      user-select: none;
    }
  </style>
</head>
<body>
  <canvas id="draw"></canvas>
  <div id="hint">Klik om te tekenen • C = wissen • F = fullscreen</div>

  <script>
    const canvas = document.getElementById("draw");
    const ctx = canvas.getContext("2d");
    const hint = document.getElementById("hint");

    let drawing = false;
    let lastX = 0;
    let lastY = 0;

    function resize() {
      const image = ctx.getImageData(0, 0, canvas.width || 1, canvas.height || 1);
      canvas.width = window.innerWidth * devicePixelRatio;
      canvas.height = window.innerHeight * devicePixelRatio;
      canvas.style.width = window.innerWidth + "px";
      canvas.style.height = window.innerHeight + "px";
      ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
      ctx.fillStyle = "#000";
      ctx.fillRect(0, 0, window.innerWidth, window.innerHeight);
      try { ctx.putImageData(image, 0, 0); } catch(e) {}
      setupPen();
    }

    function setupPen() {
      ctx.lineWidth = 5;
      ctx.lineCap = "round";
      ctx.lineJoin = "round";
      ctx.strokeStyle = "#00aaff";
      ctx.shadowColor = "#00aaff";
      ctx.shadowBlur = 12;
    }

    function pos(e) {
      return {
        x: e.clientX ?? e.touches?.[0]?.clientX,
        y: e.clientY ?? e.touches?.[0]?.clientY
      };
    }

    function start(e) {
      drawing = true;
      const p = pos(e);
      lastX = p.x;
      lastY = p.y;
      hint.style.display = "none";
    }

    function draw(e) {
      if (!drawing) return;
      const p = pos(e);
      ctx.beginPath();
      ctx.moveTo(lastX, lastY);
      ctx.lineTo(p.x, p.y);
      ctx.stroke();
      lastX = p.x;
      lastY = p.y;
    }

    function stop() {
      drawing = false;
    }

    function clearCanvas() {
      ctx.fillStyle = "#000";
      ctx.fillRect(0, 0, window.innerWidth, window.innerHeight);
      setupPen();
    }

    async function fullscreen() {
      if (!document.fullscreenElement) {
        await document.documentElement.requestFullscreen();
      }
    }

    canvas.addEventListener("mousedown", start);
    canvas.addEventListener("mousemove", draw);
    window.addEventListener("mouseup", stop);

    canvas.addEventListener("touchstart", (e) => { e.preventDefault(); start(e); }, { passive: false });
    canvas.addEventListener("touchmove", (e) => { e.preventDefault(); draw(e); }, { passive: false });
    window.addEventListener("touchend", stop);

    window.addEventListener("resize", resize);

    window.addEventListener("keydown", (e) => {
      if (e.key.toLowerCase() === "c") clearCanvas();
      if (e.key.toLowerCase() === "f") fullscreen();
      if (e.key === "Escape") hint.style.display = "none";
    });

    canvas.addEventListener("dblclick", fullscreen);

    resize();
  </script>
</body>
</html>
