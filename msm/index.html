<!doctype html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>.</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      cursor: none;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      background: #000;
      cursor: none;
    }

    #penCursor {
      position: fixed;
      width: 26px;
      height: 6px;
      background: #fff;
      border-radius: 4px;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-3px, -3px) rotate(-45deg);
      transform-origin: 3px 3px;
      box-shadow: 0 0 8px rgba(255,255,255,0.9);
      opacity: 0;
    }

    #penCursor::after {
      content: "";
      position: absolute;
      right: -7px;
      top: 0;
      width: 0;
      height: 0;
      border-top: 3px solid transparent;
      border-bottom: 3px solid transparent;
      border-left: 8px solid #fff;
    }

    #hint {
      position: fixed;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.18);
      font-family: Arial, sans-serif;
      font-size: 13px;
      pointer-events: none;
      user-select: none;
    }
  </style>
</head>

<body>
  <canvas id="draw"></canvas>
  <div id="penCursor"></div>
  <div id="hint"></div>

  <script>
    const canvas = document.getElementById("draw");
    const ctx = canvas.getContext("2d");
    const hint = document.getElementById("hint");
    const penCursor = document.getElementById("penCursor");

    let drawing = false;
    let currentStroke = null;
    const strokes = [];

    function setupPen() {
      ctx.lineWidth = 5;
      ctx.lineCap = "round";
      ctx.lineJoin = "round";
      ctx.strokeStyle = "#ffffff";
      ctx.shadowColor = "#ffffff";
      ctx.shadowBlur = 12;
    }

    function resize() {
      canvas.width = Math.round(window.innerWidth * devicePixelRatio);
      canvas.height = Math.round(window.innerHeight * devicePixelRatio);
      canvas.style.width = window.innerWidth + "px";
      canvas.style.height = window.innerHeight + "px";
      ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
      redraw();
    }

    function clearBackground() {
      ctx.save();
      ctx.shadowBlur = 0;
      ctx.fillStyle = "#000";
      ctx.fillRect(0, 0, window.innerWidth, window.innerHeight);
      ctx.restore();
    }

    function drawStroke(stroke) {
      if (!stroke || stroke.length === 0) return;

      setupPen();
      ctx.beginPath();
      ctx.moveTo(stroke[0].x, stroke[0].y);

      if (stroke.length === 1) {
        ctx.lineTo(stroke[0].x + 0.01, stroke[0].y + 0.01);
      } else {
        for (let i = 1; i < stroke.length; i++) {
          ctx.lineTo(stroke[i].x, stroke[i].y);
        }
      }

      ctx.stroke();
    }

    function redraw() {
      clearBackground();

      for (const stroke of strokes) {
        drawStroke(stroke);
      }

      if (currentStroke) {
        drawStroke(currentStroke);
      }
    }

    function pos(e) {
      const touch = e.touches?.[0] || e.changedTouches?.[0];

      return {
        x: touch ? touch.clientX : e.clientX,
        y: touch ? touch.clientY : e.clientY
      };
    }

    function start(e) {
      if (e.button !== undefined && e.button !== 0) return;

      drawing = true;
      currentStroke = [pos(e)];
      hint.style.display = "none";
      redraw();
    }

    function draw(e) {
      updatePenCursor(e);

      if (!drawing || !currentStroke) return;

      currentStroke.push(pos(e));
      redraw();
    }

    function stop() {
      if (!drawing || !currentStroke) return;

      drawing = false;

      if (currentStroke.length > 0) {
        strokes.push(currentStroke);
      }

      currentStroke = null;
      redraw();
    }

    function undo() {
      if (strokes.length === 0) return;
      strokes.pop();
      redraw();
    }

    function clearCanvas() {
      strokes.length = 0;
      currentStroke = null;
      drawing = false;
      redraw();
    }

    function updatePenCursor(e) {
      if (e.touches) return;

      penCursor.style.left = e.clientX + "px";
      penCursor.style.top = e.clientY + "px";
      penCursor.style.opacity = "1";
    }

    async function fullscreen() {
      try {
        if (!document.fullscreenElement) {
          await document.documentElement.requestFullscreen();
        }
      } catch (error) {
        console.log("Fullscreen kon niet worden geopend:", error);
      }
    }

    canvas.addEventListener("mousedown", start);
    canvas.addEventListener("mousemove", draw);
    canvas.addEventListener("mouseenter", updatePenCursor);
    canvas.addEventListener("mouseleave", () => {
      penCursor.style.opacity = "0";
    });

    window.addEventListener("mouseup", stop);

    canvas.addEventListener("touchstart", (e) => {
      e.preventDefault();
      start(e);
    }, { passive: false });

    canvas.addEventListener("touchmove", (e) => {
      e.preventDefault();
      draw(e);
    }, { passive: false });

    window.addEventListener("touchend", stop);
    window.addEventListener("resize", resize);

    window.addEventListener("keydown", (e) => {
      const key = e.key.toLowerCase();

      if (e.key === "Backspace") {
        e.preventDefault();
        undo();
      }

      if (key === "c") {
        clearCanvas();
      }

      if (key === "f") {
        fullscreen();
      }

      if (e.key === "Escape") {
        hint.style.display = "none";
      }
    });

    canvas.addEventListener("dblclick", fullscreen);

    resize();
  </script>
</body>
</html>
